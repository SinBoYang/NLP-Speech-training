<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SpeakElite — AI 演說教練{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="brand">
        <span class="brand-icon">🎤</span>
        <span class="brand-text">SpeakElite</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">訓練</a>
        <a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">關於</a>
      </div>
    </div>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  {% block scripts %}{% endblock %}
</body>
</html>
